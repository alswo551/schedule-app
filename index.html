<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<title>근무 일정 관리</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'맑은 고딕','Malgun Gothic',sans-serif;background:#F0F4F8;color:#1a1a2e;font-size:14px}
button,input,select,textarea{font-family:inherit}

/* ── LAYOUT ── */
#app{display:flex;flex-direction:column;height:100vh;overflow:hidden}
.header{background:#1F3864;color:#fff;padding:0;flex-shrink:0;box-shadow:0 2px 8px rgba(0,0,0,.25);display:flex;flex-direction:column}
.hdr-row1{display:flex;align-items:center;gap:8px;padding:8px 16px}
.hdr-row2{display:flex;align-items:center;gap:8px;padding:4px 16px 8px}
.hdr-spacer{flex:1}
.body{display:flex;flex:1;overflow:hidden}
.sidebar{width:320px;background:#fff;border-right:1px solid #DDE2EC;overflow-y:auto;flex-shrink:0;-webkit-overflow-scrolling:touch}
.calendar-area{flex:1;overflow:auto;padding:16px}

/* ── HEADER ── */
.hbtn{background:rgba(255,255,255,.15);color:#fff;border:1px solid rgba(255,255,255,.3);padding:6px 12px;border-radius:6px;font-size:13px;transition:.15s;cursor:pointer;white-space:nowrap}
.hbtn:hover{background:rgba(255,255,255,.25)}
.hbtn.accent{background:#2E75B6;border-color:#2E75B6}
.hbtn.danger{background:rgba(192,0,0,.75);border-color:rgba(192,0,0,.9)}
.nav-btn{background:none;border:none;color:#fff;font-size:18px;padding:2px 8px;line-height:1;cursor:pointer}
.month-lbl{font-size:15px;font-weight:500;min-width:110px;text-align:center}
.title-input{background:transparent;border:none;border-bottom:1.5px solid rgba(255,255,255,.4);color:#fff;font-size:15px;font-weight:500;padding:2px 4px;flex:1;outline:none}
.title-input:focus{border-bottom-color:#fff;background:rgba(255,255,255,.1);border-radius:4px 4px 0 0}
.menu-toggle{display:none;background:none;border:none;color:#fff;font-size:24px;padding:2px 6px;cursor:pointer;touch-action:manipulation;-webkit-tap-highlight-color:transparent}

/* ── SIDEBAR ── */
.sb-section{border-bottom:1px solid #EEF1F8}
.sb-title{padding:9px 14px;font-weight:500;font-size:13px;color:#1F3864;display:flex;justify-content:space-between;align-items:center;background:#F7F9FF;cursor:pointer;user-select:none}
.sb-title .arrow{font-size:11px;transition:.2s}
.sb-body{padding:10px 12px}
.sb-body.collapsed{display:none}
.item-row{display:flex;align-items:center;gap:6px;padding:5px 4px;border-radius:5px;margin-bottom:3px;min-height:36px}
.item-row:hover .ia{opacity:1}
.color-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0;cursor:pointer;border:1.5px solid rgba(0,0,0,.15)}
.name-input{border:none;background:transparent;font-size:13px;flex:1;padding:2px 4px;border-radius:3px;outline:none}
.name-input:focus{background:#F0F4FF;outline:1px solid #4472C4}
.ia{opacity:0;display:flex;gap:2px;transition:.15s}
.del-btn{background:none;border:none;color:#C00000;font-size:14px;padding:0 3px;cursor:pointer;line-height:1}
.add-row{display:flex;gap:6px;margin-top:8px}
.add-row input,.add-row select{flex:1;border:1px solid #DDE2EC;border-radius:5px;padding:5px 8px;font-size:12px;outline:none}
.add-row input:focus,.add-row select:focus{border-color:#4472C4}
.add-row button{background:#4472C4;color:#fff;border:none;border-radius:5px;padding:5px 10px;font-size:12px;cursor:pointer;white-space:nowrap}
.emp-role-badge{font-size:10px;padding:1px 6px;border-radius:8px;color:#fff;white-space:nowrap;flex-shrink:0}
.shift-time{font-size:10px;color:#888;margin-left:2px}

/* ── COLOR PICKER ── */
.cpop{position:fixed;background:#fff;border:1px solid #DDE2EC;border-radius:8px;padding:10px;display:none;z-index:500;flex-wrap:wrap;gap:6px;width:164px;box-shadow:0 4px 16px rgba(0,0,0,.15)}
.cpop.open{display:flex}
.cswatch{width:24px;height:24px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:.1s}
.cswatch:hover{transform:scale(1.15)}
.cswatch.sel{border-color:#1F3864}

/* ── CALENDAR ── */
.cal-card{background:#fff;border-radius:8px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.1)}
.cal-days-hdr{display:grid;grid-template-columns:repeat(7,1fr)}
.day-hdr{padding:8px 4px;text-align:center;font-weight:500;font-size:13px;color:#fff}
.cal-body{display:grid;grid-template-columns:repeat(7,1fr)}
.day-cell{min-height:110px;padding:6px;border-top:1px solid #E8ECF4;border-right:1px solid #E8ECF4;cursor:pointer;transition:.15s;position:relative;display:flex;flex-direction:column;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
.day-cell:nth-child(7n){border-right:none}
.day-cell:hover{filter:brightness(.96)}
.day-cell.empty{background:#F8F9FC!important;cursor:default}
.day-cell.empty:hover{filter:none}
.day-cell.active{outline:2px solid #4472C4;outline-offset:-2px;z-index:1}
.d-num{font-weight:500;font-size:13px;margin-bottom:3px;display:flex;align-items:center;gap:4px}
.d-badge{background:#4472C4;color:#fff;border-radius:10px;padding:1px 6px;font-size:10px}
.d-pair{font-size:9.5px;line-height:1.4;margin-bottom:1px;display:flex;align-items:center;gap:2px}
.d-pair-emp{font-weight:500}
.d-pair-shift{color:#666;font-size:9px}
.d-headcount{margin-top:auto;padding-top:4px;border-top:1px dashed #DDE2EC;font-size:10px;display:flex;align-items:center;gap:3px}

/* ── MODAL ── */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;align-items:center;justify-content:center}
.overlay.open{display:flex}
.modal{background:#fff;border-radius:10px;width:560px;max-width:96vw;max-height:88vh;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 8px 32px rgba(0,0,0,.2)}
.modal-hdr{background:#1F3864;color:#fff;padding:12px 16px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
.modal-hdr h3{font-size:15px;font-weight:500;margin:0}
.modal-close{background:none;border:none;color:#fff;font-size:22px;line-height:1;padding:0 4px;cursor:pointer}
.modal-body{padding:14px;overflow-y:auto;flex:1;-webkit-overflow-scrolling:touch}
.modal-footer{padding:10px 16px;border-top:1px solid #EEF1F8;display:flex;gap:8px;flex-shrink:0}
.mfbtn{padding:7px 14px;border-radius:6px;font-size:13px;border:1px solid #DDE2EC;background:#fff;cursor:pointer;touch-action:manipulation}
.mfbtn:hover{background:#F0F4FF}
.mfbtn.danger{color:#C00000;border-color:#F5C0C0}
.mfbtn.primary{background:#1F3864;color:#fff;border-color:#1F3864}

/* ── 스케줄 배정 UI ── */
.pair-list{display:flex;flex-direction:column;gap:6px;margin-bottom:12px}
.pair-item{display:flex;align-items:center;gap:8px;background:#F7F9FF;border:1px solid #E8ECF4;border-radius:7px;padding:8px 10px}
.pair-emp-badge{display:flex;align-items:center;gap:5px;flex:1;min-width:0}
.pair-emp-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.pair-emp-name{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pair-shift-badge{background:#E8EDF4;color:#444;font-size:11px;padding:2px 8px;border-radius:10px;white-space:nowrap;flex-shrink:0}
.pair-del{background:none;border:none;color:#ccc;font-size:16px;cursor:pointer;padding:0 2px;flex-shrink:0;line-height:1}
.pair-del:hover{color:#C00000}
.add-pair-row{display:flex;gap:6px;align-items:center;background:#EEF6EE;border:1px dashed #70AD47;border-radius:7px;padding:8px 10px}
.add-pair-row select{flex:1;border:1px solid #DDE2EC;border-radius:5px;padding:6px 8px;font-size:13px;background:#fff;outline:none;min-width:0}
.add-pair-row select:focus{border-color:#4472C4}
.add-pair-btn{background:#375623;color:#fff;border:none;border-radius:5px;padding:7px 12px;font-size:13px;cursor:pointer;white-space:nowrap;flex-shrink:0;touch-action:manipulation}
.modal-section-title{font-size:12px;font-weight:500;color:#666;margin-bottom:6px}

/* ── IMAGE PREVIEW MODAL ── */
#ipOv{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:400;align-items:center;justify-content:center;padding:24px}
#ipOv.open{display:flex}
.ipbox{background:#fff;border-radius:12px;overflow:hidden;display:flex;flex-direction:column;width:min(740px,90vw);max-height:80vh;box-shadow:0 16px 48px rgba(0,0,0,.35)}
.ipbox-hdr{background:#1F3864;color:#fff;padding:12px 16px;display:flex;align-items:center;gap:8px;flex-shrink:0}
.ipbox-hdr h3{font-size:14px;font-weight:500;flex:1;margin:0}
.iph-fname{font-size:11px;opacity:.65;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:200px}
.ipbox-body{overflow:auto;flex:1;padding:14px;background:#E8EDF4;display:flex;justify-content:center;-webkit-overflow-scrolling:touch;max-height:50vh}
.ipbox-body img{max-width:100%;height:auto;border-radius:5px;box-shadow:0 2px 12px rgba(0,0,0,.15)}
.ipbox-hint-mob{display:none;font-size:12px;color:#4a4a00;background:#FFFBE6;border-top:1px solid #FFD700;padding:8px 14px;text-align:center;line-height:1.5;flex-shrink:0}
.ipbox-footer{padding:14px 16px;border-top:1px solid #E8ECF4;display:flex;gap:10px;align-items:center;flex-shrink:0}
.iph-hint{font-size:11px;color:#aaa;flex:1}
.ip-btn{border:none;padding:10px 22px;border-radius:7px;font-size:14px;font-family:inherit;cursor:pointer;min-height:46px;font-weight:500;touch-action:manipulation;transition:.15s}
.ip-btn-cancel{background:#f0f0f0;color:#444;border:1px solid #ddd}
.ip-btn-save{background:#1F3864;color:#fff}
.ip-btn-share{background:#375623;color:#fff;display:none}
@media(max-width:600px){
  #ipOv{padding:10px}
  .ipbox{width:100%;max-height:88vh}
  .ipbox-body{max-height:44vh;padding:10px}
  .ipbox-hint-mob{display:block}
  .ipbox-footer{gap:8px;padding:10px 12px}
  .iph-hint{display:none}
  .ip-btn{flex:1;padding:12px 8px;font-size:14px;min-height:50px}
}

/* ── OVERLAY BG ── */
.overlay-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:199;-webkit-tap-highlight-color:transparent}
.overlay-bg.show{display:block}

/* ── SCROLLBAR ── */
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-thumb{background:#CBD2E0;border-radius:3px}

/* ── MOBILE ── */
@media(max-width:900px){
  /* ── 메뉴토글 ── */
  .menu-toggle{display:block}

  /* ── 헤더 ── */
  .hdr-row1{padding:8px 10px;gap:6px}
  .hdr-row2{padding:4px 10px 8px;gap:6px}
  .title-input{font-size:15px;flex:1;min-width:0}
  .hbtn{padding:7px 10px;font-size:12px;touch-action:manipulation;white-space:nowrap;-webkit-tap-highlight-color:transparent;flex-shrink:0}
  .nav-btn{font-size:18px;padding:2px 8px;min-width:44px;min-height:44px;touch-action:manipulation;-webkit-tap-highlight-color:transparent}
  .month-lbl{font-size:14px;min-width:80px;text-align:center}

  /* ── 사이드바 슬라이드 ── */
  .sidebar{
    position:fixed;left:-330px;top:0;bottom:0;z-index:200;
    width:320px;
    transition:left .25s cubic-bezier(.4,0,.2,1);
    box-shadow:4px 0 28px rgba(0,0,0,.28);
    overflow-y:auto;-webkit-overflow-scrolling:touch;
    padding-bottom:env(safe-area-inset-bottom,0)
  }
  .sidebar.open{left:0}

  /* ── 사이드바 내부 입력 (iOS 16px+ 자동확대 방지) ── */
  .sb-body input,.sb-body select{font-size:16px;min-height:46px;padding:9px 10px;-webkit-appearance:none}
  .add-row button{min-height:46px;font-size:14px;touch-action:manipulation;-webkit-tap-highlight-color:transparent;padding:8px 12px}
  .name-input{font-size:16px;min-height:40px}
  .del-btn{font-size:18px;padding:5px 10px;min-width:44px;min-height:44px;touch-action:manipulation;-webkit-tap-highlight-color:transparent;opacity:1}
  .item-row{padding:7px 4px;min-height:48px}
  .item-row .ia{opacity:1}
  .color-dot{width:14px;height:14px}

  /* ── 캘린더 영역 ── */
  .body{overflow:visible}
  .calendar-area{
    padding:8px 4px 20px;
    overflow-x:auto;overflow-y:visible;
    -webkit-overflow-scrolling:touch;
    scroll-snap-type:x mandatory
  }
  .cal-card{min-width:580px;scroll-snap-align:start}
  .day-hdr{padding:8px 2px;font-size:12px}
  .day-cell{
    min-height:96px;padding:6px 5px;
    -webkit-tap-highlight-color:transparent;
    touch-action:manipulation
  }
  .d-num{font-size:12px;margin-bottom:3px}
  .d-badge{font-size:10px;padding:1px 5px}
  .d-pair{font-size:9.5px;line-height:1.45;margin-bottom:2px}
  .d-headcount{font-size:9.5px}

  /* ── 근무배정 모달: 하단 시트 ── */
  .overlay{align-items:flex-end;padding:0}
  .modal{
    width:100%;max-width:100%;max-height:90vh;
    border-radius:18px 18px 0 0;
    padding-bottom:env(safe-area-inset-bottom,0)
  }
  .modal-hdr{padding:14px 18px}
  .modal-body{padding:12px 14px}
  .modal-footer{gap:8px;flex-wrap:wrap;padding:10px 14px 14px}
  .mfbtn{min-height:48px;padding:9px 12px;flex:1;touch-action:manipulation;-webkit-tap-highlight-color:transparent;font-size:13px}
  .pair-item{padding:10px 12px;min-height:48px}
  .pair-del{font-size:20px;padding:4px 8px;min-width:44px;min-height:44px;touch-action:manipulation}
  .add-pair-row{flex-wrap:wrap;gap:8px;padding:10px 12px}
  .add-pair-row select{min-height:48px;font-size:15px;-webkit-appearance:none;flex:1;width:100%}
  .add-pair-btn{min-height:48px;font-size:14px;width:100%;touch-action:manipulation}
  .modal-section-title{font-size:13px;margin-bottom:8px}
}

@media(max-width:480px){
  .cal-card{min-width:460px}
  .day-cell{min-height:80px;padding:5px 3px}
  #saveBtn,#loadBtn{display:none}
  .title-input{font-size:14px}
  .hbtn{padding:7px 8px;font-size:11px}
}
</style>
</head>
<body>
<div class="overlay-bg" id="overlayBg"></div>
<div id="app">
  <header class="header">
    <div class="hdr-row1">
      <button class="menu-toggle" id="menuToggle">☰</button>
      <input class="title-input" id="appTitleInput" value="근무 일정 관리" maxlength="30">
      <div class="hdr-spacer"></div>
      <button class="hbtn" id="saveBtn">저장</button>
      <button class="hbtn" id="loadBtn">불러오기</button>
      <input type="file" id="fileInput" accept=".json" style="display:none">
    </div>
    <div class="hdr-row2">
      <button class="nav-btn" id="prevMonth">&#9664;</button>
      <span class="month-lbl" id="monthLbl"></span>
      <button class="nav-btn" id="nextMonth">&#9654;</button>
      <div class="hdr-spacer"></div>
      <button class="hbtn accent" id="imgExportBtn">이미지 저장</button>
      <button class="hbtn" id="exportBtn">엑셀</button>
      <button class="hbtn danger" id="resetBtn">초기화</button>
    </div>
  </header>
  <div class="body">
    <aside class="sidebar">

      <!-- 직원 목록 -->
      <div class="sb-section">
        <div class="sb-title" onclick="toggleSb('empBody',this)">
          <span>직원 목록</span><span class="arrow">▾</span>
        </div>
        <div class="sb-body" id="empBody">
          <div id="empList"></div>
          <div class="add-row">
            <input id="newEmpName" placeholder="이름 입력" maxlength="10">
            <select id="newEmpRole"></select>
            <button id="addEmpBtn">추가</button>
          </div>
        </div>
      </div>

      <!-- 업무 목록 -->
      <div class="sb-section">
        <div class="sb-title" onclick="toggleSb('roleBody',this)">
          <span>업무 목록</span><span class="arrow">▾</span>
        </div>
        <div class="sb-body" id="roleBody">
          <div id="roleList"></div>
          <div class="add-row">
            <input id="newRoleName" placeholder="업무명 입력" maxlength="30">
            <button id="addRoleBtn">추가</button>
          </div>
        </div>
      </div>

      <!-- 근무타임 목록 -->
      <div class="sb-section">
        <div class="sb-title" onclick="toggleSb('shiftBody',this)">
          <span>근무타임 목록</span><span class="arrow">▾</span>
        </div>
        <div class="sb-body" id="shiftBody">
          <div id="shiftList"></div>
          <div class="add-row">
            <input id="newShiftName" placeholder="예: 오전 9:00~14:00" maxlength="50">
            <button id="addShiftBtn">추가</button>
          </div>
        </div>
      </div>

    </aside>

    <div class="calendar-area">
      <div class="cal-card" id="calCard">
        <div class="cal-days-hdr" id="daysHdr"></div>
        <div class="cal-body" id="calBody"></div>
      </div>
    </div>
  </div>
</div>

<!-- 근무 배정 모달 -->
<div class="overlay" id="overlay">
  <div class="modal">
    <div class="modal-hdr">
      <h3 id="modalTitle"></h3>
      <button class="modal-close" id="modalClose">×</button>
    </div>
    <div class="modal-body">
      <p class="modal-section-title">배정된 스케줄</p>
      <div class="pair-list" id="pairList"></div>
      <div class="add-pair-row" id="addPairRow">
        <select id="selEmp"></select>
        <select id="selShift"></select>
        <button class="add-pair-btn" id="addPairBtn">+ 추가</button>
      </div>
    </div>
    <div class="modal-footer">
      <button class="mfbtn danger" id="clearDayBtn">이날 초기화</button>
      <button class="mfbtn" id="copyPrevBtn">전날 복사</button>
      <div style="flex:1"></div>
      <button class="mfbtn primary" id="modalConfirm">확인</button>
    </div>
  </div>
</div>

<!-- 이미지 미리보기 모달 -->
<div id="ipOv">
  <div class="ipbox">
    <div class="ipbox-hdr"><h3>이미지 미리보기</h3><span class="iph-fname" id="ipFname"></span></div>
    <div class="ipbox-body"><img id="ipImg" src="" alt="미리보기"></div>
    <div class="ipbox-hint-mob" id="ipMHint">저장하기를 누르거나 이미지를 <b>길게 눌러</b> 앨범에 저장하세요</div>
    <div class="ipbox-footer">
      <span class="iph-hint">미리보기 확인 후 저장하세요</span>
      <button class="ip-btn ip-btn-cancel" id="ipCancel">취소</button>
      <button class="ip-btn ip-btn-share" id="ipShare">앨범에 저장</button>
      <button class="ip-btn ip-btn-save" id="ipSave">저장하기</button>
    </div>
  </div>
</div>

<!-- 색상 피커 -->
<div class="cpop" id="cpop"></div>

<script>
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// PALETTE & STATE
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const PALETTE = ['#4472C4','#2E75B6','#70AD47','#ED7D31','#FFC000','#FF0000',
  '#7030A0','#00B0F0','#375623','#843C0C','#FF6699','#00B4D8',
  '#A9D18E','#FFE699','#595959','#1F3864'];

const DAYS_KOR = ['월','화','수','목','금','토','일'];
const DAY_HDR_COLOR = {5:'#2E75B6', 6:'#C00000'};
const DAY_BG = {5:'#EAF2FF', 6:'#FFECEC'};

function loadState(){
  try{const d=localStorage.getItem('scheduleApp3');return d?JSON.parse(d):null;}catch(e){return null;}
}
function saveState(){

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// HELPERS

function schedKey(y,m,d){return `${y}-${m}-${d}`;}
function getDaysInMonth(y,m){return new Date(y,m,0).getDate();}
function getFirstDayOfWeek(y,m){const d=new Date(y,m-1,1).getDay();return d===0?6:d-1;}
function getRoleColor(roleId){const r=state.roles.find(r=>r.id===roleId);return r?r.color:'#888';}
function getShiftLabel(shiftId){
  const s=state.shifts.find(s=>s.id===shiftId);
  return s?s.name:'';
}
function getShiftName(shiftId){const s=state.shifts.find(s=>s.id===shiftId);return s?s.name:'';}
function getShiftColor(shiftId){const s=state.shifts.find(s=>s.id===shiftId);return s?s.color:'#888';}
function getEmpName(empId){const e=state.employees.find(e=>e.id===empId);return e?e.name:'';}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

function renderEmployees(){

  if(curVal) roleSelect.value = curVal;

    const roleOpts = state.roles.map(r=>`<option value="${r.id}"${r.id===e.roleId?' selected':''}>${r.name}</option>`).join('');

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// CALENDAR
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function renderCalendar(){
  const {year,month} = state;
  document.getElementById('monthLbl').textContent = `${year}년 ${month}월`;
  document.getElementById('appTitleInput').value = state.title||'근무 일정 관리';
  document.title = (state.title||'근무 일정 관리') + ` — ${year}년 ${month}월`;

  const daysInMonth = getDaysInMonth(year,month);
  const startDow = getFirstDayOfWeek(year,month);

  // 요일 헤더
  document.getElementById('daysHdr').innerHTML = DAYS_KOR.map((d,i)=>`
    <div class="day-hdr" style="background:${DAY_HDR_COLOR[i]||'#4472C4'}">${d}</div>`).join('');

  let html = '';
  let cellCount = 0;
  for(let i=0;i<startDow;i++){html+=`<div class="day-cell empty"></div>`;cellCount++;}

  for(let d=1;d<=daysInMonth;d++){
    const dow = (startDow+d-1)%7;
    const key = schedKey(year,month,d);
    const pairs = state.schedule[key]||[];
    const uniqueEmps = new Set(pairs.map(p=>p.empId)).size;
    const bg = DAY_BG[dow]||'#fff';
    const numColor = dow===6?'#C00000':dow===5?'#2E75B6':'#1F3864';

    let pairLines = pairs.map(p=>{
      const emp = state.employees.find(e=>e.id===p.empId);
      const empColor = emp ? getRoleColor(emp.roleId) : '#888';
      const shiftName = getShiftName(p.shiftId);
      const shiftColor = getShiftColor(p.shiftId);
      return `<div class="d-pair">
        <span style="width:7px;height:7px;border-radius:50%;background:${empColor};display:inline-block;flex-shrink:0"></span>
        <span class="d-pair-emp">${emp?emp.name:''}</span>
        ${shiftName?`<span class="d-pair-shift" style="color:${shiftColor}">·${shiftName}</span>`:''}
      </div>`;
    }).join('');

    const hcColor = dow===6?'#C00000':dow===5?'#2E75B6':'#4472C4';
    const hcFooter = uniqueEmps>0
      ? `<div class="d-headcount" style="color:${hcColor}">
          <span style="width:6px;height:6px;border-radius:50%;background:${hcColor};display:inline-block"></span>
          총 <b>${uniqueEmps}</b>명
        </div>` : '';

    html+=`<div class="day-cell" style="background:${bg}" data-date="${d}" onclick="openModal(${d})">
      <div class="d-num" style="color:${numColor}">${d}${pairs.length?`<span class="d-badge">${pairs.length}</span>`:''}</div>
      ${pairLines}
      ${hcFooter}
    </div>`;
    cellCount++;
  }
  const rem = cellCount%7===0?0:7-(cellCount%7);
  for(let i=0;i<rem;i++) html+=`<div class="day-cell empty"></div>`;
  document.getElementById('calBody').innerHTML = html;
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// MODAL
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
let modalDate = null;
let modalPairs = []; // [{empId, shiftId}]

function openModal(date){
  const {year,month} = state;
  const key = schedKey(year,month,date);
  modalDate = date;
  modalPairs = JSON.parse(JSON.stringify(state.schedule[key]||[]));
  document.getElementById('modalTitle').textContent = `${year}년 ${month}월 ${date}일 근무 배정`;
  document.getElementById('overlay').classList.add('open');
  renderModalPairs();
  document.querySelectorAll('.day-cell').forEach(c=>c.classList.toggle('active',+c.dataset.date===date));
}

function renderModalPairs(){
  // 배정 목록
  const pList = document.getElementById('pairList');
  if(!modalPairs.length){
    pList.innerHTML='<p style="font-size:12px;color:#aaa;padding:8px 0">배정된 스케줄이 없습니다</p>';
  } else {
    pList.innerHTML = modalPairs.map((p,i)=>{
      const emp = state.employees.find(e=>e.id===p.empId);
      const empColor = emp?getRoleColor(emp.roleId):'#888';
      const shiftLabel = getShiftLabel(p.shiftId);
      const shiftColor = getShiftColor(p.shiftId);
      return `<div class="pair-item">
        <div class="pair-emp-badge">
          <div class="pair-emp-dot" style="background:${empColor}"></div>
          <span class="pair-emp-name">${emp?emp.name:'?'}</span>
        </div>
        <span class="pair-shift-badge" style="background:${shiftColor}22;color:${shiftColor};border:1px solid ${shiftColor}44">${shiftLabel}</span>
        <button class="pair-del" onclick="removePair(${i})">✕</button>
      </div>`;
    }).join('');
  }

  // 추가 드롭다운
  const empSel = document.getElementById('selEmp');
  const shiftSel = document.getElementById('selShift');
  empSel.innerHTML = state.employees.map(e=>
    `<option value="${e.id}">${e.name}${state.roles.find(r=>r.id===e.roleId)?` (${state.roles.find(r=>r.id===e.roleId).name})`:''}</option>`
  ).join('');
  shiftSel.innerHTML = state.shifts.map(s=>
    `<option value="${s.id}">${getShiftLabel(s.id)}</option>`
  ).join('');
}

function removePair(idx){
  modalPairs.splice(idx,1);
  renderModalPairs();
}

function addPair(){
  const empId = +document.getElementById('selEmp').value;
  const shiftId = +document.getElementById('selShift').value;
  if(!empId||!shiftId) return;
  // 같은 직원+타임 중복 체크
  if(modalPairs.some(p=>p.empId===empId&&p.shiftId===shiftId)){
    alert('이미 동일한 직원+타임이 배정되어 있습니다.'); return;
  }
  modalPairs.push({empId,shiftId});
  renderModalPairs();
}

function closeModal(){
  document.getElementById('overlay').classList.remove('open');
  document.querySelectorAll('.day-cell').forEach(c=>c.classList.remove('active'));
  modalDate=null;
}

function confirmModal(){
  if(!modalDate) return;
  const key = schedKey(state.year,state.month,modalDate);
  if(modalPairs.length) state.schedule[key]=modalPairs;
  else delete state.schedule[key];
  closeModal(); saveState(); renderCalendar();
}

function clearDay(){modalPairs=[];renderModalPairs();}

function copyPrev(){
  if(!modalDate) return;
  const {year,month} = state;
  let pd=modalDate-1,py=year,pm=month;
  if(pd<1){pm--;if(pm<1){pm=12;py--;}pd=getDaysInMonth(py,pm);}
  const prev=state.schedule[schedKey(py,pm,pd)]||[];
  modalPairs=JSON.parse(JSON.stringify(prev));
  renderModalPairs();
}

document.getElementById('addPairBtn').onclick=addPair;
document.getElementById('modalClose').onclick=closeModal;
document.getElementById('modalConfirm').onclick=confirmModal;
document.getElementById('clearDayBtn').onclick=clearDay;
document.getElementById('copyPrevBtn').onclick=copyPrev;
document.getElementById('overlay').addEventListener('click',e=>{if(e.target===document.getElementById('overlay'))closeModal();});

// ROLE CRUD
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function addRole(){
  const n=document.getElementById('newRoleName').value.trim();
  if(!n) return;
  state.roles.push({id:state.nextRoleId++,name:n,color:PALETTE[state.roles.length%PALETTE.length]});
  document.getElementById('newRoleName').value='';
  saveState(); renderRoles(); renderEmployees(); renderCalendar();
}
function deleteRole(id){
  if(state.roles.length<=1){alert('업무는 최소 1개 필요합니다.');return;}
  if(!confirm('업무를 삭제하면 해당 업무 소속 직원의 업무가 변경됩니다.')) return;
  state.roles=state.roles.filter(r=>r.id!==id);
  state.employees.forEach(e=>{if(e.roleId===id)e.roleId=state.roles[0].id;});
  saveState(); renderRoles(); renderEmployees(); renderCalendar();
}
function renameRole(id,val){
  const r=state.roles.find(r=>r.id===id);
  if(r&&val.trim()) r.name=val.trim();
  saveState(); renderEmployees(); renderCalendar();
}
document.getElementById('addRoleBtn').onclick=addRole;
document.getElementById('newRoleName').onkeydown=e=>{if(e.key==='Enter')addRole();};

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// EMPLOYEE CRUD
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function addEmployee(){
  const name=document.getElementById('newEmpName').value.trim();
  if(!name) return;
  const roleId=+document.getElementById('newEmpRole').value||state.roles[0]?.id||1;
  state.employees.push({id:state.nextEmpId++,name,roleId});
  document.getElementById('newEmpName').value='';
  saveState(); renderEmployees(); renderCalendar();
}
function renameEmployee(id,val){
  const e=state.employees.find(e=>e.id===id);
  if(e&&val.trim()) e.name=val.trim();
  saveState(); renderCalendar();
}
function deleteEmployee(id){
  if(!confirm('직원을 삭제하면 해당 직원의 모든 배정이 제거됩니다.')) return;
  state.employees=state.employees.filter(e=>e.id!==id);
  Object.keys(state.schedule).forEach(k=>{
    state.schedule[k]=state.schedule[k].filter(p=>p.empId!==id);
    if(!state.schedule[k].length) delete state.schedule[k];
  });
  saveState(); renderEmployees(); renderCalendar();
}
function changeEmpRole(empId,roleId){
  const e=state.employees.find(e=>e.id===empId);
  if(e) e.roleId=roleId;
  saveState(); renderEmployees();
}
document.getElementById('addEmpBtn').onclick=addEmployee;
document.getElementById('newEmpName').onkeydown=e=>{if(e.key==='Enter')addEmployee();};

function deleteShift(id){

function renameShift(id,val){

document.getElementById('addShiftBtn').onclick=addShift;
document.getElementById('newShiftName').onkeydown=e=>{if(e.key==='Enter')addShift();};

// COLOR PICKER
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
let cpopTarget=null, cpopType=null;
function openColorPick(e,id,type){
  e.stopPropagation();
  cpopTarget=id; cpopType=type;
  const obj=(type==='role'?state.roles:state.shifts).find(x=>x.id===id);
  const pop=document.getElementById('cpop');
  pop.innerHTML=PALETTE.map(c=>`
    <div class="cswatch${obj&&obj.color===c?' sel':''}" style="background:${c}" onclick="pickColor('${c}')"></div>`).join('');
  pop.style.left=(e.clientX-10)+'px';
  pop.style.top=(e.clientY+14)+'px';
  pop.classList.add('open');
}
function pickColor(color){
  const arr=cpopType==='role'?state.roles:state.shifts;
  const obj=arr.find(x=>x.id===cpopTarget);
  if(obj) obj.color=color;
  document.getElementById('cpop').classList.remove('open');
  saveState();
  if(cpopType==='role'){renderRoles();renderEmployees();}else{renderShifts();}
  renderCalendar();
}
document.addEventListener('click',e=>{
  const pop=document.getElementById('cpop');
  if(!pop.contains(e.target)) pop.classList.remove('open');
});

document.getElementById('nextMonth').onclick=()=>{

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
document.getElementById('resetBtn').onclick=()=>{
  const title=state.title||'근무 일정 관리';
  if(!confirm(`⚠️ "${title}" ${state.year}년 ${state.month}월의 모든 근무 배정을 삭제합니다.\n직원·업무·근무타임은 유지됩니다.\n\n정말 초기화하시겠습니까?`)) return;
  const {year:yn,month:mn}=state;
  Object.keys(state.schedule).forEach(k=>{
    const [y,m]=k.split('-').map(Number);
    if(y===yn&&m===mn) delete state.schedule[k];
  });
  saveState();renderCalendar();
};

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// SAVE / LOAD JSON
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
document.getElementById('saveBtn').onclick=()=>{
  const url=URL.createObjectURL(new Blob([JSON.stringify(state,null,2)],{type:'application/json'}));
  const a=document.createElement('a');a.href=url;
  a.download=`근무일정_백업_${state.year}${String(state.month).padStart(2,'0')}.json`;
  a.click();URL.revokeObjectURL(url);
};
document.getElementById('loadBtn').onclick=()=>document.getElementById('fileInput').click();
document.getElementById('fileInput').onchange=e=>{
  const f=e.target.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=ev=>{
    try{
      const d=JSON.parse(ev.target.result);
      if(d.employees&&d.schedule){
        if(!d.shifts) d.shifts=[{id:1,name:'기본',color:'#4472C4',start:'',end:''}];
        if(!d.nextShiftId) d.nextShiftId=10;
        state=d;saveState();
        renderRoles();renderEmployees();renderShifts();renderCalendar();
        alert('불러오기 완료!');
      }else alert('올바른 파일이 아닙니다.');
    }catch{alert('파일 읽기 오류');}
    e.target.value='';
  };r.readAsText(f);
};

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// EXCEL EXPORT
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
document.getElementById('exportBtn').onclick=()=>{
  const {year,month}=state;
  const daysInMonth=getDaysInMonth(year,month);
  const startDow=getFirstDayOfWeek(year,month);
  const wb=XLSX.utils.book_new();
  const aoa=[['',`${year}년 ${month}월 ${state.title||'근무 일정'}`,'','','','','','']];
  aoa.push(['','월','화','수','목','금','토','일']);
  let d=1,row=[];
  for(let i=0;i<startDow;i++) row.push('');
  while(d<=daysInMonth){
    const pairs=state.schedule[schedKey(year,month,d)]||[];
    let txt=`${d}일`;
    pairs.forEach(p=>{txt+=`\n${getEmpName(p.empId)} · ${getShiftLabel(p.shiftId)}`;});
    row.push(txt);
    if(row.length===7){aoa.push([''].concat(row));row=[];}
    d++;
  }
  if(row.length){while(row.length<7)row.push('');aoa.push([''].concat(row));}
  const ws=XLSX.utils.aoa_to_sheet(aoa);
  ws['!merges']=[{s:{r:0,c:1},e:{r:0,c:7}}];
  ws['!cols']=[{wch:2},...Array(7).fill({wch:24})];
  ws['!rows']=[{hpt:36},{hpt:24},...Array(6).fill({hpt:90})];
  XLSX.utils.book_append_sheet(wb,ws,`${month}월 캘린더`);
  const rows2=[['날짜','직원','근무타임']];
  Object.entries(state.schedule).forEach(([key,pairs])=>{
    const [,, dd]=key.split('-');
    pairs.forEach(p=>{
      rows2.push([+dd,getEmpName(p.empId),getShiftLabel(p.shiftId)]);
    });
  });
  rows2.sort((a,b)=>a[0]-b[0]);
  const ws2=XLSX.utils.aoa_to_sheet(rows2);
  ws2['!cols']=[{wch:8},{wch:12},{wch:24}];
  XLSX.utils.book_append_sheet(wb,ws2,'상세데이터');
  XLSX.writeFile(wb,`${year}년_${month}월_근무일정.xlsx`);
};

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// IMAGE EXPORT
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
(function(){
  var bindExport=function(){
    var ov=document.getElementById('ipOv');
    var imgEl=document.getElementById('ipImg');
    var fnEl=document.getElementById('ipFname');
    var mhEl=document.getElementById('ipMHint');
    var saveBtn=document.getElementById('ipSave');
    var shareBtn=document.getElementById('ipShare');
    var cancelBtn=document.getElementById('ipCancel');
    if(!ov||!saveBtn||!cancelBtn)return;
    var _url=null,_fname=null;
    function isMob(){return /Mobi|Android|iPhone|iPad/i.test(navigator.userAgent);}
    function closeIP(){ov.classList.remove('open');_url=null;_fname=null;}
    document.getElementById('imgExportBtn').onclick=async function(){
      var btn=document.getElementById('imgExportBtn');
      btn.textContent='캡처 중...';btn.disabled=true;
      try{
        var target=document.getElementById('calCard');
        var tb=document.createElement('div');
        var yr=state.year,mo=state.month;
        tb.textContent=yr+'년 '+String(mo).padStart(2,'0')+'월 근무 스케줄표';
        tb.style.cssText='background:#1F3864;color:#fff;text-align:center;padding:14px 20px;font-size:20px;font-weight:700;font-family:맑은 고딕,sans-serif;letter-spacing:2px;line-height:1.4';
        target.insertBefore(tb,target.firstChild);
        var dpr=Math.max(window.devicePixelRatio||1,2);
        var cv=await html2canvas(target,{backgroundColor:'#ffffff',scale:dpr*1.5,useCORS:true,logging:false});
        target.removeChild(tb);
        var fname=(state.title||'근무 일정 관리').replace(/\s+/g,'_');
        _fname=fname+'_'+yr+'_'+mo+'.png';
        _url=cv.toDataURL('image/png');
        imgEl.src=_url;fnEl.textContent=_fname;
        var mob=isMob();
        var hs=mob&&typeof navigator.share==='function'&&typeof navigator.canShare==='function';
        shareBtn.style.display=hs?'':'none';
        saveBtn.style.display=hs?'none':'';
        mhEl.style.display=mob?'block':'none';
        ov.classList.add('open');
      }catch(e){alert('이미지 캡처 오류: '+e.message);}
      finally{btn.textContent='이미지 저장';btn.disabled=false;}
    };
    saveBtn.onclick=function(){if(!_url)return;var a=document.createElement('a');a.href=_url;a.download=_fname;a.click();closeIP();};
    shareBtn.onclick=function(){
      if(!_url)return;
      fetch(_url).then(function(r){return r.blob();}).then(function(b){
        var f=new File([b],_fname,{type:'image/png'});
        if(navigator.canShare&&navigator.canShare({files:[f]})){
          navigator.share({files:[f],title:(state.title||'근무 일정 관리')}).catch(function(e){if(e.name!=='AbortError'){var a=document.createElement('a');a.href=_url;a.download=_fname;a.click();}});
        }else{var a=document.createElement('a');a.href=_url;a.download=_fname;a.click();}
      }).catch(function(){var a=document.createElement('a');a.href=_url;a.download=_fname;a.click();});
      closeIP();
    };
    cancelBtn.onclick=closeIP;
    ov.addEventListener('click',function(e){if(e.target===ov)closeIP();});
  };
  if(document.readyState==='loading'){document.addEventListener('DOMContentLoaded',bindExport);}else{bindExport();}
})();

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// SIDEBAR TOGGLE & SWIPE
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function toggleSb(id,el){
  const b=document.getElementById(id);
  b.classList.toggle('collapsed');
  el.querySelector('.arrow').textContent=b.classList.contains('collapsed')?'▸':'▾';
}
const _mt=document.getElementById('menuToggle');
const _ob=document.getElementById('overlayBg');
const _sb=document.querySelector('.sidebar');
function openSB(){_sb.classList.add('open');_ob.classList.add('show');}
function closeSB(){_sb.classList.remove('open');_ob.classList.remove('show');}
_mt.addEventListener('click',()=>_sb.classList.contains('open')?closeSB():openSB());
_ob.addEventListener('click',closeSB);

// 스와이프 월 이동
(()=>{
  const ca=document.querySelector('.calendar-area');
  if(!ca)return;
  let tx=0,ty=0,sw=false;
  ca.addEventListener('touchstart',e=>{if(e.touches.length!==1)return;tx=e.touches[0].clientX;ty=e.touches[0].clientY;sw=true;},{passive:true});
  ca.addEventListener('touchend',e=>{
    if(!sw)return;sw=false;
    const dx=e.changedTouches[0].clientX-tx;
    const dy=e.changedTouches[0].clientY-ty;
    if(Math.abs(dx)>60&&Math.abs(dx)>Math.abs(dy)*1.5){
      if(dx<0){state.month++;if(state.month>12){state.month=1;state.year++;}}
      else{state.month--;if(state.month<1){state.month=12;state.year--;}}
      saveState();renderCalendar();
    }
  },{passive:true});
})();

renderRoles();
renderEmployees();
renderShifts();
renderCalendar();
</script>
