<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>근무 일정 관리</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'맑은 고딕','Malgun Gothic',sans-serif;background:#F0F4F8;color:#1a1a2e;font-size:14px}
button{font-family:inherit;cursor:pointer}
input,textarea{font-family:inherit}

/* ── LAYOUT ── */
#app{display:flex;flex-direction:column;height:100vh;overflow:hidden}
.header{background:#1F3864;color:#fff;padding:0;flex-shrink:0;box-shadow:0 2px 8px rgba(0,0,0,.25);display:flex;flex-direction:column}
.header h1{font-size:16px;font-weight:500;flex:1}
.hdr-row1{display:flex;align-items:center;gap:8px;padding:8px 16px;flex-wrap:nowrap}
.hdr-row2{display:flex;align-items:center;gap:8px;padding:4px 16px 8px;flex-wrap:nowrap}
.hdr-spacer{flex:1}
.body{display:flex;flex:1;overflow:hidden}
.sidebar{width:260px;background:#fff;border-right:1px solid #DDE2EC;display:flex;flex-direction:column;overflow:hidden;flex-shrink:0}
.calendar-area{flex:1;overflow:auto;padding:16px}

/* ── HEADER BUTTONS ── */
.hbtn{background:rgba(255,255,255,.15);color:#fff;border:1px solid rgba(255,255,255,.3);padding:6px 12px;border-radius:6px;font-size:13px;transition:.15s}
.hbtn:hover{background:rgba(255,255,255,.25)}
.hbtn.accent{background:#2E75B6;border-color:#2E75B6}
.hbtn.accent:hover{background:#1F5A9A}
.hbtn.danger{background:rgba(192,0,0,.75);border-color:rgba(192,0,0,.9)}
.hbtn.danger:hover{background:#C00000}
.title-input{background:transparent;border:none;border-bottom:1.5px solid rgba(255,255,255,.4);color:#fff;font-size:15px;font-weight:500;font-family:inherit;padding:2px 4px;width:220px;outline:none;transition:.15s}
.title-input:focus{border-bottom-color:#fff;background:rgba(255,255,255,.1);border-radius:4px 4px 0 0}
.title-input::placeholder{color:rgba(255,255,255,.5)}
.nav-btn{background:none;border:none;color:#fff;font-size:18px;padding:2px 8px;line-height:1}
.month-lbl{font-size:15px;font-weight:500;min-width:110px;text-align:center}

/* ── SIDEBAR SECTIONS ── */
.sb-section{border-bottom:1px solid #EEF1F8;flex-shrink:0}
.sb-title{padding:10px 14px;font-weight:500;font-size:13px;color:#1F3864;display:flex;justify-content:space-between;align-items:center;background:#F7F9FF;cursor:pointer;user-select:none}
.sb-title span{display:flex;align-items:center;gap:6px}
.sb-title .arrow{font-size:11px;transition:.2s}
.sb-body{padding:10px 12px;max-height:280px;overflow-y:auto}
.sb-body.collapsed{display:none}

/* ── ROLE ITEMS ── */
.role-item{display:flex;align-items:center;gap:6px;padding:5px 4px;border-radius:5px;margin-bottom:3px}
.role-item:hover .item-actions{opacity:1}
.role-dot{width:11px;height:11px;border-radius:50%;flex-shrink:0;cursor:pointer;border:1.5px solid rgba(0,0,0,.15)}
.role-name-input{border:none;background:transparent;font-size:13px;flex:1;padding:2px 4px;border-radius:3px;outline:none;color:#1a1a2e}
.role-name-input:focus{background:#F0F4FF;outline:1px solid #4472C4}
.item-actions{opacity:0;display:flex;gap:3px;transition:.15s}
.del-btn{background:none;border:none;color:#C00000;font-size:14px;padding:0 3px;line-height:1}
.del-btn:hover{color:#900}
.add-row{display:flex;gap:6px;margin-top:8px}
.add-row input{flex:1;border:1px solid #DDE2EC;border-radius:5px;padding:5px 8px;font-size:12px;outline:none}
.add-row input:focus{border-color:#4472C4}
.add-row button{background:#4472C4;color:#fff;border:none;border-radius:5px;padding:5px 10px;font-size:12px}
.add-row button:hover{background:#1F5A9A}

/* ── EMPLOYEE ITEMS ── */
.emp-item{display:flex;align-items:center;gap:6px;padding:5px 4px;border-radius:5px;margin-bottom:3px}
.emp-item:hover .item-actions{opacity:1}
.emp-avatar{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:500;color:#fff;flex-shrink:0}
.emp-name{font-size:13px;flex:1}
.emp-role-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}

/* ── CALENDAR ── */
.cal-card{background:#fff;border-radius:8px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.1)}
.cal-days-hdr{display:grid;grid-template-columns:repeat(7,1fr)}
.day-hdr{padding:8px 4px;text-align:center;font-weight:500;font-size:13px;color:#fff}
.cal-body{display:grid;grid-template-columns:repeat(7,1fr)}
.day-cell{min-height:105px;padding:7px;border-top:1px solid #E8ECF4;border-right:1px solid #E8ECF4;cursor:pointer;transition:.15s;position:relative}
.day-cell:nth-child(7n){border-right:none}
.day-cell:hover{filter:brightness(.96)}
.day-cell.empty{background:#F8F9FC!important;cursor:default}
.day-cell.empty:hover{filter:none}
.day-cell.active{outline:2px solid #4472C4;outline-offset:-2px;z-index:1}
.d-num{font-weight:500;font-size:13px;margin-bottom:4px;display:flex;align-items:center;gap:5px}
.d-badge{background:#4472C4;color:#fff;border-radius:10px;padding:1px 6px;font-size:10px}
.d-role-line{font-size:10px;line-height:1.5;margin-bottom:1px}
.d-role-label{font-weight:500}

/* ── MODAL ── */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;align-items:center;justify-content:center}
.overlay.open{display:flex}
.modal{background:#fff;border-radius:10px;width:580px;max-width:96vw;max-height:88vh;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 8px 32px rgba(0,0,0,.2)}
.modal-hdr{background:#1F3864;color:#fff;padding:12px 16px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
.modal-hdr h3{font-size:15px;font-weight:500}
.modal-close{background:none;border:none;color:#fff;font-size:22px;line-height:1;padding:0 4px}
.modal-body{padding:16px;overflow-y:auto;flex:1}
.modal-roles-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(155px,1fr));gap:14px}
.modal-role-col{border:1px solid #E8ECF4;border-radius:7px;overflow:hidden}
.modal-role-hdr{padding:8px 10px;font-weight:500;font-size:12px;color:#fff}
.modal-role-body{padding:8px}
.check-row{display:flex;align-items:center;gap:8px;padding:4px 4px;border-radius:4px;cursor:pointer}
.check-row:hover{background:#F0F4FF}
.check-row label{font-size:13px;cursor:pointer;user-select:none}
.check-row input[type=checkbox]{cursor:pointer;accent-color:#4472C4;width:14px;height:14px}
.modal-footer{padding:10px 16px;border-top:1px solid #EEF1F8;display:flex;gap:8px;flex-shrink:0}
.mfbtn{padding:7px 14px;border-radius:6px;font-size:13px;border:1px solid #DDE2EC;background:#fff}
.mfbtn:hover{background:#F0F4FF}
.mfbtn.danger{color:#C00000;border-color:#F5C0C0}
.mfbtn.danger:hover{background:#FFF0F0}

/* ── COLOR PICKER POPUP ── */
.cpop{position:fixed;background:#fff;border:1px solid #DDE2EC;border-radius:8px;padding:10px;display:none;z-index:200;box-shadow:0 4px 16px rgba(0,0,0,.15);flex-wrap:wrap;gap:6px;width:160px}
.cpop.open{display:flex}
.cswatch{width:22px;height:22px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:.1s}
.cswatch:hover{transform:scale(1.15)}
.cswatch.sel{border-color:#333}

/* ── HEADCOUNT FOOTER ── */
.d-headcount{margin-top:auto;padding-top:4px;border-top:1px dashed #DDE2EC;font-size:10px;color:var(--hc-color,#555);display:flex;align-items:center;gap:4px}
.d-headcount-dot{width:6px;height:6px;border-radius:50%;background:var(--hc-color,#4472C4);flex-shrink:0}
.day-cell{display:flex;flex-direction:column}

/* ── SCROLLBAR ── */
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-thumb{background:#CBD2E0;border-radius:3px}

/* ── MOBILE RESPONSIVE ── */
.menu-toggle{display:none;background:none;border:none;color:#fff;font-size:24px;padding:2px 6px;line-height:1;cursor:pointer;touch-action:manipulation;-webkit-tap-highlight-color:transparent;flex-shrink:0}
.overlay-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:199;-webkit-tap-highlight-color:transparent}
.overlay-bg.show{display:block}

/* 이미지 미리보기 - 모바일 */
@media(max-width:768px){
  .img-preview-footer{flex-wrap:wrap;gap:8px;padding:10px 14px}
}

@media(max-width:900px){
  .menu-toggle{display:block}

  /* 헤더 */
  .hdr-row1{padding:8px 10px;gap:6px}
  .hdr-row2{padding:4px 10px 8px;gap:6px}
  .title-input{flex:1;min-width:0;font-size:15px;width:auto;max-width:none}
  .hbtn{padding:6px 10px;font-size:12px;touch-action:manipulation;white-space:nowrap;-webkit-tap-highlight-color:transparent}
  .nav-btn{font-size:18px;padding:2px 8px;min-width:40px;min-height:40px;touch-action:manipulation;-webkit-tap-highlight-color:transparent}
  .month-lbl{font-size:14px;min-width:80px}

  /* 사이드바 */
  .sidebar{
    position:fixed;left:-280px;top:0;bottom:0;z-index:200;
    transition:left .25s cubic-bezier(.4,0,.2,1);
    box-shadow:4px 0 28px rgba(0,0,0,.28);
    overflow-y:auto;-webkit-overflow-scrolling:touch;
    padding-bottom:env(safe-area-inset-bottom,0)
  }
  .sidebar.open{left:0}

  /* 사이드바 입력 (iOS 16px+ 필수) */
  .sb-body input,.sb-body select{font-size:16px;padding:9px 10px;min-height:46px}
  .add-row button{min-height:46px;padding:8px 14px;font-size:14px;touch-action:manipulation}
  .role-name-input{font-size:16px;min-height:40px}
  .del-btn{font-size:18px;padding:5px 10px;min-width:44px;min-height:44px;touch-action:manipulation}
  .emp-item,.role-item{padding:8px 4px;min-height:46px}

  /* 캘린더 */
  .body{overflow:visible}
  .calendar-area{
    padding:8px 4px 16px;
    overflow-x:auto;-webkit-overflow-scrolling:touch;
    overflow-y:visible
  }
  .cal-card{min-width:580px}
  .day-hdr{padding:8px 2px;font-size:12px}
  .day-cell{
    min-height:92px;padding:6px 5px;
    touch-action:manipulation;-webkit-tap-highlight-color:transparent
  }
  .d-num{font-size:12px;margin-bottom:3px}
  .d-badge{font-size:10px;padding:1px 5px}
  .d-role-line{font-size:9.5px;line-height:1.45;margin-bottom:2px}
  .d-headcount{font-size:9.5px}

  /* 모달 하단 시트 */
  .overlay{align-items:flex-end;padding:0}
  .modal{
    width:100%;max-width:100%;max-height:88vh;
    border-radius:18px 18px 0 0;
    padding-bottom:env(safe-area-inset-bottom,0)
  }
  .modal-hdr{padding:14px 18px}
  .modal-body{padding:12px}
  .modal-roles-grid{grid-template-columns:1fr 1fr;gap:10px}
  .check-row{min-height:46px;padding:6px 4px;touch-action:manipulation;-webkit-tap-highlight-color:transparent}
  .check-row input[type=checkbox]{width:20px;height:20px;flex-shrink:0}
  .check-row label{font-size:14px}
  .modal-footer{padding:10px 14px 14px;gap:8px;flex-wrap:wrap}
  .mfbtn{min-height:46px;padding:9px 14px;font-size:13px;touch-action:manipulation;flex:1}
}

@media(max-width:480px){
  .cal-card{min-width:460px}
  .day-cell{min-height:78px;padding:5px 3px}
  .modal-roles-grid{grid-template-columns:1fr}
  /* 저장/불러오기 숨김 */
  #saveBtn,#loadBtn{display:none}
}
/* ── IMAGE PREVIEW MODAL ── */
#ipOv{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:400;align-items:center;justify-content:center;padding:24px}
#ipOv.open{display:flex}
.ipbox{background:#fff;border-radius:12px;overflow:hidden;display:flex;flex-direction:column;width:min(740px,90vw);max-height:80vh;box-shadow:0 16px 48px rgba(0,0,0,.35)}
.ipbox-hdr{background:#1F3864;color:#fff;padding:12px 16px;display:flex;align-items:center;gap:8px;flex-shrink:0}
.ipbox-hdr h3{font-size:14px;font-weight:500;flex:1;margin:0}
.iph-fname{font-size:11px;opacity:.65;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:200px}
.ipbox-body{overflow:auto;flex:1;padding:14px;background:#E8EDF4;display:flex;justify-content:center;align-items:flex-start;-webkit-overflow-scrolling:touch;max-height:50vh}
.ipbox-body img{max-width:100%;height:auto;border-radius:5px;box-shadow:0 2px 12px rgba(0,0,0,.15)}
.ipbox-hint-mob{display:none;font-size:12px;color:#4a4a00;background:#FFFBE6;border-top:1px solid #FFD700;padding:8px 14px;text-align:center;line-height:1.5;flex-shrink:0}
.ipbox-footer{padding:14px 16px;border-top:1px solid #E8ECF4;display:flex;gap:10px;align-items:center;flex-shrink:0}
.iph-hint{font-size:11px;color:#aaa;flex:1}
.ip-btn{border:none;padding:10px 22px;border-radius:7px;font-size:14px;font-family:inherit;cursor:pointer;min-height:46px;font-weight:500;touch-action:manipulation;transition:.15s}
.ip-btn-cancel{background:#f0f0f0;color:#444;border:1px solid #ddd}
.ip-btn-cancel:hover{background:#e0e0e0}
.ip-btn-save{background:#1F3864;color:#fff}
.ip-btn-save:hover{background:#2E75B6}
.ip-btn-share{background:#375623;color:#fff;display:none}
.ip-btn-share:hover{background:#4a7a30}
@media(max-width:600px){
  #ipOv{padding:10px}
  .ipbox{width:100%;max-height:88vh}
  .ipbox-body{max-height:44vh;padding:10px}
  .ipbox-hint-mob{display:block}
  .ipbox-footer{gap:8px;padding:10px 12px}
  .iph-hint{display:none}
  .ip-btn{flex:1;padding:12px 8px;font-size:14px;min-height:50px}
}
</style>

  <meta name="apple-mobile-web-app-title" content="근무 일정 관리">

<body>
<div id="app">
  <div class="overlay-bg" id="overlayBg"></div>
  <header class="header">
    <div class="hdr-row1">
      <button class="menu-toggle" id="menuToggle">☰</button>
      <input class="title-input" id="appTitleInput" value="근무 일정 관리" placeholder="제목 입력" maxlength="30">
      <div class="hdr-spacer"></div>
      <button class="hbtn" id="saveBtn">저장</button>
      <button class="hbtn" id="loadBtn">불러오기</button>
      <input type="file" id="fileInput" accept=".json" style="display:none">
    </div>
    <div class="hdr-row2">
      <button class="nav-btn" id="prevMonth">&#9664;</button>
      <span class="month-lbl" id="monthLbl"></span>
      <button class="nav-btn" id="nextMonth">&#9654;</button>
      <div class="hdr-spacer"></div>
      <button class="hbtn accent" id="imgExportBtn">이미지 저장</button>
      <button class="hbtn" id="exportBtn">엑셀</button>
      <button class="hbtn danger" id="resetBtn">초기화</button>
    </div>
  </header>
  <div class="body">
    <aside class="sidebar">
      <!-- Roles -->
      <div class="sb-section">
        <div class="sb-title" id="roleToggle">
          <span>업무 목록</span>
          <span class="arrow">▾</span>
        </div>
        <div class="sb-body" id="roleBody">
          <div id="roleList"></div>
          <div class="add-row">
            <input id="newRoleName" placeholder="업무 이름 입력" maxlength="20">
            <button id="addRoleBtn">추가</button>
          </div>
        </div>
      </div>
      <!-- Employees -->
      <div class="sb-section" style="flex:1;overflow:hidden;display:flex;flex-direction:column">
        <div class="sb-title" id="empToggle">
          <span>직원 목록</span>
          <span class="arrow">▾</span>
        </div>
        <div class="sb-body" id="empBody" style="flex:1;max-height:none">
          <div id="empList"></div>
          <div class="add-row">
            <input id="newEmpName" placeholder="직원 이름 입력" maxlength="10">
            <button id="addEmpBtn">추가</button>
          </div>
        </div>
      </div>
    </aside>
    <div class="calendar-area">
      <div class="cal-card" id="calCard">
        <div class="cal-days-hdr" id="daysHdr"></div>
        <div class="cal-body" id="calBody"></div>
      </div>
    </div>
  </div>
</div>

<!-- Image Preview Modal -->


<!-- Modal -->
<div class="overlay" id="overlay">
  <div class="modal">
    <div class="modal-hdr">
      <h3 id="modalTitle"></h3>
      <button class="modal-close" id="modalClose">×</button>
    </div>
    <div class="modal-body">
      <div class="modal-roles-grid" id="modalRoles"></div>
    </div>
    <div class="modal-footer">
      <button class="mfbtn danger" id="clearDayBtn">이날 초기화</button>
      <button class="mfbtn" id="copyPrevBtn">전날 복사</button>
      <div style="flex:1"></div>
      <button class="mfbtn" style="background:#1F3864;color:#fff;border-color:#1F3864" id="modalConfirm">확인</button>
    </div>
  </div>
</div>

<!-- Color picker -->
<div class="cpop" id="cpop"></div>

<script>
const PALETTE = ['#4472C4','#2E75B6','#C00000','#70AD47','#ED7D31','#A020F0','#00B0F0','#FF0066','#1F3864','#375623','#843C0C','#4B0082'];
const DAYS_KOR = ['월','화','수','목','금','토','일'];
const DAY_HEADER_COLORS = {'5':'#2E75B6','6':'#C00000'};
const DAY_BG = {'5':'#EAF2FF','6':'#FFECEC'};

let state = loadState() || {
  title: '근무 일정 관리',
  year: 2026, month: 4,
  roles: [
    {id:1,name:'로티번 제조',color:'#4472C4'},
    {id:2,name:'버터떡 제조',color:'#2E75B6'},
    {id:3,name:'캐셔 및 포장',color:'#70AD47'}
  ],
  employees: [
    {id:1,name:'박진웅',roleId:1},{id:2,name:'최민재',roleId:1},
    {id:3,name:'장종수',roleId:2},{id:4,name:'김진수',roleId:2},
    {id:5,name:'정승우',roleId:3},{id:6,name:'이은희',roleId:3}
  ],
  schedule:{},
  nextRoleId:4, nextEmpId:7
};

let modalDate = null;
let modalTemp = {}; // {roleId:[empIds]}
let colorPickTarget = null;

function saveState(){
  try{ localStorage.setItem('scheduleApp',JSON.stringify(state)); }catch(e){}
}
function loadState(){
  try{ const d=localStorage.getItem('scheduleApp'); return d?JSON.parse(d):null; }catch(e){return null;}
}
function schedKey(y,m,d){ return `${y}-${m}-${d}`; }

function getDaysInMonth(y,m){ return new Date(y,m,0).getDate(); }
function getFirstDayOfWeek(y,m){
  const d = new Date(y,m-1,1).getDay(); // 0=Sun
  return d===0?6:d-1; // 0=Mon
}

// ── RENDER SIDEBAR ──
function renderRoles(){
  const list = document.getElementById('roleList');
  list.innerHTML = state.roles.map(r=>`
    <div class="role-item" data-id="${r.id}">
      <div class="role-dot" style="background:${r.color}" onclick="openColorPick(event,${r.id})" title="색상 변경"></div>
      <input class="role-name-input" value="${r.name}" onchange="renameRole(${r.id},this.value)" onblur="renameRole(${r.id},this.value)" maxlength="20">
      <div class="item-actions">
        <button class="del-btn" onclick="deleteRole(${r.id})" title="삭제">✕</button>
      </div>
    </div>
  `).join('');
}

function renderEmployees(){
  const list = document.getElementById('empList');
  list.innerHTML = state.employees.map(e=>{
    const role = state.roles.find(r=>r.id===e.roleId)||state.roles[0]||{color:'#888'};
    const initials = e.name.slice(0,1);
    return `<div class="emp-item" data-id="${e.id}">
      <div class="emp-avatar" style="background:${role?role.color:'#888'}">${initials}</div>
      <span class="emp-name">${e.name}</span>
      <select style="border:none;background:transparent;font-size:11px;color:#666;max-width:80px;outline:none" onchange="changeEmpRole(${e.id},+this.value)">
        ${state.roles.map(r=>`<option value="${r.id}"${r.id===e.roleId?' selected':''}>${r.name.replace(' 제조','').replace(' 및 포장','')}</option>`).join('')}
      </select>
      <div class="item-actions">
        <button class="del-btn" onclick="deleteEmployee(${e.id})">✕</button>
      </div>
    </div>`;
  }).join('');
}

// ── RENDER CALENDAR ──
function renderCalendar(){
  const {year,month} = state;
  document.getElementById('monthLbl').textContent = `${year}년 ${month}월`;
  document.getElementById('appTitleInput').value = state.title||'근무 일정 관리';
  document.title = (state.title||'근무 일정 관리') + ` — ${year}년 ${month}월`;
  const daysInMonth = getDaysInMonth(year,month);
  const startDow = getFirstDayOfWeek(year,month); // 0=Mon

  // Headers
  const hdr = document.getElementById('daysHdr');
  hdr.innerHTML = DAYS_KOR.map((d,i)=>{
    const bg = DAY_HEADER_COLORS[i]||'#4472C4';
    return `<div class="day-hdr" style="background:${bg}">${d}</div>`;
  }).join('');

  // Cells
  const body = document.getElementById('calBody');
  let html = '';
  let cellCount = 0;

  // Leading empty cells
  for(let i=0;i<startDow;i++){
    html+=`<div class="day-cell empty"></div>`;
    cellCount++;
  }

  for(let d=1;d<=daysInMonth;d++){
    const dow = (startDow+d-1)%7; // 0=Mon
    const key = schedKey(year,month,d);
    const sched = state.schedule[key]||{};
    const bg = DAY_BG[dow]||'#fff';
    const numColor = dow===6?'#C00000':dow===5?'#2E75B6':'#1F3864';

    // 중복 제거 총 인원 (복수 업무 담당자 1회만 카운트)
    const uniqueEmpIds = new Set(Object.values(sched).flat());
    const headcount = uniqueEmpIds.size;

    let lines = '';
    state.roles.forEach(r=>{
      const names = (sched[r.id]||[]).map(eid=>{
        const emp=state.employees.find(e=>e.id===eid);
        return emp?emp.name:'';
      }).filter(Boolean);
      if(!names.length) return;
      lines+=`<div class="d-role-line">
        <span class="d-role-label" style="color:${r.color}">${r.name.replace(' 제조','').replace(' 및 포장','')}</span>
        <br><span style="color:#444">${names.join(', ')}</span>
      </div>`;
    });

    const hcColor = dow===6?'#C00000':dow===5?'#2E75B6':'#4472C4';
    const hcFooter = headcount>0
      ? `<div class="d-headcount" style="--hc-color:${hcColor}">
           <div class="d-headcount-dot"></div>총 <b>${headcount}</b>명
         </div>`
      : '';

    html+=`<div class="day-cell" style="background:${bg}" data-date="${d}" onclick="openModal(${d})">
      <div class="d-num" style="color:${numColor}">${d}</div>
      ${lines}
      ${hcFooter}
    </div>`;
    cellCount++;
  }

  // Trailing empty
  const remaining = cellCount%7===0?0:7-(cellCount%7);
  for(let i=0;i<remaining;i++) html+=`<div class="day-cell empty"></div>`;

  body.innerHTML = html;
}

// ── MODAL ──
function openModal(date){
  const {year,month} = state;
  const key = schedKey(year,month,date);
  modalDate = date;
  modalTemp = JSON.parse(JSON.stringify(state.schedule[key]||{}));

  document.getElementById('modalTitle').textContent = `${year}년 ${month}월 ${date}일 근무 배정`;
  document.getElementById('overlay').classList.add('open');
  renderModalRoles();
  document.querySelectorAll('.day-cell').forEach(c=>{
    c.classList.toggle('active', +c.dataset.date===date);
  });
}

function renderModalRoles(){
  const grid = document.getElementById('modalRoles');
  grid.innerHTML = state.roles.map(r=>{
    const assigned = modalTemp[r.id]||[];
    const checks = state.employees.map(e=>{
      const chk = assigned.includes(e.id);
      return `<div class="check-row" onclick="toggleModalEmp(${r.id},${e.id})">
        <input type="checkbox" ${chk?'checked':''} onclick="event.stopPropagation();toggleModalEmp(${r.id},${e.id})">
        <label>${e.name}</label>
      </div>`;
    }).join('');
    return `<div class="modal-role-col">
      <div class="modal-role-hdr" style="background:${r.color}">${r.name}</div>
      <div class="modal-role-body">${checks}</div>
    </div>`;
  }).join('');
}

function toggleModalEmp(roleId,empId){
  if(!modalTemp[roleId]) modalTemp[roleId]=[];
  const arr=modalTemp[roleId];
  const i=arr.indexOf(empId);
  if(i>=0) arr.splice(i,1); else arr.push(empId);
  renderModalRoles();
}

function closeModal(){
  document.getElementById('overlay').classList.remove('open');
  document.querySelectorAll('.day-cell').forEach(c=>c.classList.remove('active'));
  modalDate=null;
}

function confirmModal(){
  if(!modalDate) return;
  const key = schedKey(state.year,state.month,modalDate);
  // Remove empty role arrays
  const clean = {};
  Object.entries(modalTemp).forEach(([rid,arr])=>{if(arr.length) clean[+rid]=arr;});
  if(Object.keys(clean).length) state.schedule[key]=clean;
  else delete state.schedule[key];
  closeModal();
  saveState();
  renderCalendar();
}

function clearDay(){
  if(!modalDate) return;
  modalTemp={};
  renderModalRoles();
}

function copyPrev(){
  if(!modalDate) return;
  const {year,month} = state;
  let pd=modalDate-1, py=year, pm=month;
  if(pd<1){pm--;if(pm<1){pm=12;py--;}pd=getDaysInMonth(py,pm);}
  const prevKey=schedKey(py,pm,pd);
  const prev=state.schedule[prevKey]||{};
  modalTemp=JSON.parse(JSON.stringify(prev));
  renderModalRoles();
}

// ── ROLE CRUD ──
function addRole(){
  const input=document.getElementById('newRoleName');
  const name=input.value.trim();
  if(!name) return;
  const color=PALETTE[state.roles.length%PALETTE.length];
  state.roles.push({id:state.nextRoleId++,name,color});
  input.value='';
  saveState();
  renderRoles();
  renderEmployees();
  renderCalendar();
}

function deleteRole(id){
  if(state.roles.length<=1){alert('업무는 최소 1개 필요합니다.');return;}
  if(!confirm('업무를 삭제하면 해당 업무의 모든 배정이 제거됩니다. 계속할까요?')) return;
  state.roles = state.roles.filter(r=>r.id!==id);
  // Remove from schedule
  Object.keys(state.schedule).forEach(k=>{delete state.schedule[k][id];});
  // Reassign employees
  state.employees.forEach(e=>{if(e.roleId===id) e.roleId=state.roles[0].id;});
  saveState();
  renderRoles(); renderEmployees(); renderCalendar();
}

function renameRole(id,val){
  const r=state.roles.find(r=>r.id===id);
  if(r&&val.trim()) r.name=val.trim();
  saveState();
  renderEmployees(); renderCalendar();
}

// ── COLOR PICKER ──
function openColorPick(e,roleId){
  e.stopPropagation();
  colorPickTarget=roleId;
  const pop=document.getElementById('cpop');
  pop.innerHTML=PALETTE.map(c=>{
    const r=state.roles.find(r=>r.id===roleId);
    const sel=r&&r.color===c?'sel':'';
    return `<div class="cswatch ${sel}" style="background:${c}" onclick="pickColor('${c}')"></div>`;
  }).join('');
  pop.style.left=(e.clientX-10)+'px';
  pop.style.top=(e.clientY+14)+'px';
  pop.classList.add('open');
}

function pickColor(color){
  const r=state.roles.find(r=>r.id===colorPickTarget);
  if(r) r.color=color;
  document.getElementById('cpop').classList.remove('open');
  saveState();
  renderRoles(); renderEmployees(); renderCalendar();
}

document.addEventListener('click',e=>{
  const pop=document.getElementById('cpop');
  if(!pop.contains(e.target)) pop.classList.remove('open');
});

// ── EMPLOYEE CRUD ──
function addEmployee(){
  const input=document.getElementById('newEmpName');
  const name=input.value.trim();
  if(!name) return;
  const defaultRole=state.roles[0]?.id||1;
  state.employees.push({id:state.nextEmpId++,name,roleId:defaultRole});
  input.value='';
  saveState();
  renderEmployees(); renderCalendar();
}

function deleteEmployee(id){
  if(!confirm('직원을 삭제하면 해당 직원의 모든 배정이 제거됩니다.')) return;
  state.employees=state.employees.filter(e=>e.id!==id);
  Object.keys(state.schedule).forEach(k=>{
    Object.keys(state.schedule[k]).forEach(rid=>{
      state.schedule[k][rid]=state.schedule[k][rid].filter(eid=>eid!==id);
    });
  });
  saveState();
  renderEmployees(); renderCalendar();
}

function changeEmpRole(empId,roleId){
  const e=state.employees.find(e=>e.id===empId);
  if(e) e.roleId=roleId;
  saveState();
  renderEmployees();
}

// ── NAVIGATION ──
document.getElementById('prevMonth').onclick=()=>{
  state.month--; if(state.month<1){state.month=12;state.year--;}
  saveState(); renderCalendar();
};
document.getElementById('nextMonth').onclick=()=>{
  state.month++; if(state.month>12){state.month=1;state.year++;}
  saveState(); renderCalendar();
};

// ── IMAGE EXPORT ──
(function(){
  var bindExport = function(){
    var ov=document.getElementById('ipOv');
    var imgEl=document.getElementById('ipImg');
    var fnEl=document.getElementById('ipFname');
    var mhEl=document.getElementById('ipMHint');
    var saveBtn=document.getElementById('ipSave');
    var shareBtn=document.getElementById('ipShare');
    var cancelBtn=document.getElementById('ipCancel');
    if(!ov||!saveBtn||!cancelBtn){return;}
    var _url=null,_fname=null;
    function isMob(){return /Mobi|Android|iPhone|iPad/i.test(navigator.userAgent);}
    function closeIP(){ov.classList.remove('open');_url=null;_fname=null;}
    document.getElementById('imgExportBtn').onclick=async function(){
      var btn=document.getElementById('imgExportBtn');
      btn.textContent='캡처 중...';btn.disabled=true;
      try{
        var target=document.getElementById('calCard');
        // 타이틀 배너 임시 삽입
        var tb=document.createElement('div');
        var yr=state.year,mo=state.month;
        tb.textContent=yr+'년 '+String(mo).padStart(2,'0')+'월 근무 스케줄표';
        tb.style.cssText='background:#1F3864;color:#fff;text-align:center;padding:14px 20px;font-size:20px;font-weight:700;font-family:맑은 고딕,sans-serif;letter-spacing:2px;line-height:1.4';
        target.insertBefore(tb,target.firstChild);
        var dpr=Math.max(window.devicePixelRatio||1, 2);
        var cv=await html2canvas(target,{backgroundColor:'#ffffff',scale:dpr*1.5,useCORS:true,logging:false,allowTaint:false,foreignObjectRendering:false});
        target.removeChild(tb);
        var fname=(state.title||'근무 일정 관리').replace(/\s+/g,'_');
        _fname=fname+'_'+yr+'_'+mo+'.png';
        _url=cv.toDataURL('image/png');
        imgEl.src=_url;fnEl.textContent=_fname;
        var mob=isMob();
        var hs=mob&&typeof navigator.share==='function'&&typeof navigator.canShare==='function';
        shareBtn.style.display=hs?'':'none';
        saveBtn.style.display=hs?'none':'';
        mhEl.style.display=mob?'block':'none';
        ov.classList.add('open');
      }catch(e){alert('이미지 캡처 오류: '+e.message);}
      finally{btn.textContent='이미지 저장';btn.disabled=false;}
    };
    saveBtn.onclick=function(){
      if(!_url)return;
      var a=document.createElement('a');a.href=_url;a.download=_fname;a.click();
      closeIP();
    };
    shareBtn.onclick=function(){
      if(!_url)return;
      fetch(_url).then(function(r){return r.blob();}).then(function(b){
        var f=new File([b],_fname,{type:'image/png'});
        if(navigator.canShare&&navigator.canShare({files:[f]})){
          navigator.share({files:[f],title:(state.title||'근무 일정 관리')}).catch(function(e){
            if(e.name!=='AbortError'){var a=document.createElement('a');a.href=_url;a.download=_fname;a.click();}
          });
        }else{var a=document.createElement('a');a.href=_url;a.download=_fname;a.click();}
      }).catch(function(){var a=document.createElement('a');a.href=_url;a.download=_fname;a.click();});
      closeIP();
    };
    cancelBtn.onclick=closeIP;
    ov.addEventListener('click',function(e){if(e.target===ov)closeIP();});
  };
  if(document.readyState==='loading'){
    document.addEventListener('DOMContentLoaded',bindExport);
  }else{bindExport();}
})();

// ── EXCEL EXPORT ──
document.getElementById('exportBtn').onclick=()=>{
  const {year,month} = state;
  const daysInMonth = getDaysInMonth(year,month);
  const startDow = getFirstDayOfWeek(year,month);
  const wb = XLSX.utils.book_new();
  const aoa=[];

  // Title
  aoa.push(['',`${year}년 ${month}월 팝업팀 근무 일정표`,'','','','','','']);
  aoa.push(['','월','화','수','목','금','토','일']);

  let d=1, rowCells=[];
  // leading blanks
  for(let i=0;i<startDow;i++) rowCells.push('');
  while(d<=daysInMonth){
    const key=schedKey(year,month,d);
    const sched=state.schedule[key]||{};
    let txt=`${d}일`;
    state.roles.forEach(r=>{
      const names=(sched[r.id]||[]).map(eid=>{
        const emp=state.employees.find(e=>e.id===eid);
        return emp?emp.name:'';
      }).filter(Boolean);
      if(names.length) txt+=`\n[${r.name}]\n${names.join(', ')}`;
    });
    rowCells.push(txt);
    if(rowCells.length===7){aoa.push([''].concat(rowCells));rowCells=[];}
    d++;
  }
  if(rowCells.length){while(rowCells.length<7)rowCells.push('');aoa.push([''].concat(rowCells));}

  const ws=XLSX.utils.aoa_to_sheet(aoa);
  ws['!merges']=[{s:{r:0,c:1},e:{r:0,c:7}}];
  ws['!cols']=[{wch:2},...Array(7).fill({wch:23})];
  ws['!rows']=[{hpt:36},{hpt:24},...Array(6).fill({hpt:90})];
  XLSX.utils.book_append_sheet(wb,ws,`${month}월 캘린더`);

  // Data sheet
  const rows2=[['날짜','업무','담당자']];
  Object.entries(state.schedule).forEach(([key,sched])=>{
    const [,, dd]=key.split('-');
    Object.entries(sched).forEach(([rid,empIds])=>{
      const role=state.roles.find(r=>r.id===+rid);
      empIds.forEach(eid=>{
        const emp=state.employees.find(e=>e.id===eid);
        if(role&&emp) rows2.push([+dd,role.name,emp.name]);
      });
    });
  });
  rows2.sort((a,b)=>a[0]-b[0]);
  const ws2=XLSX.utils.aoa_to_sheet(rows2);
  ws2['!cols']=[{wch:10},{wch:20},{wch:15}];
  XLSX.utils.book_append_sheet(wb,ws2,'일정데이터');

  XLSX.writeFile(wb,`${year}년_${month}월_근무일정.xlsx`);
};

// ── SAVE/LOAD JSON ──
document.getElementById('saveBtn').onclick=()=>{
  const json=JSON.stringify(state,null,2);
  const blob=new Blob([json],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url; a.download=`근무일정_백업_${state.year}${String(state.month).padStart(2,'0')}.json`;
  a.click(); URL.revokeObjectURL(url);
};
document.getElementById('loadBtn').onclick=()=>document.getElementById('fileInput').click();
document.getElementById('fileInput').onchange=e=>{
  const file=e.target.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=ev=>{
    try{
      const loaded=JSON.parse(ev.target.result);
      if(loaded.roles&&loaded.employees&&loaded.schedule){
        state=loaded;
        if(!state.title) state.title='근무 일정 관리';
        document.getElementById('appTitleInput').value=state.title;
        document.title=state.title;
        saveState();
        renderRoles(); renderEmployees(); renderCalendar();
        alert('불러오기 완료!');
      } else alert('올바른 백업 파일이 아닙니다.');
    } catch{alert('파일 읽기 오류');}
    e.target.value='';
  };
  reader.readAsText(file);
};

// ── 캘린더 스와이프 월 이동 ──
(()=>{
  const ca = document.querySelector('.calendar-area');
  if(!ca) return;
  let tx=0, ty=0, swiping=false;
  ca.addEventListener('touchstart', e=>{
    if(e.touches.length!==1) return;
    tx=e.touches[0].clientX; ty=e.touches[0].clientY; swiping=true;
  },{passive:true});
  ca.addEventListener('touchend', e=>{
    if(!swiping) return; swiping=false;
    const dx=e.changedTouches[0].clientX-tx;
    const dy=e.changedTouches[0].clientY-ty;
    if(Math.abs(dx)>60 && Math.abs(dx)>Math.abs(dy)*1.5){
      if(dx<0){ // 왼쪽 → 다음달
        state.month++; if(state.month>12){state.month=1;state.year++;}
      } else {  // 오른쪽 → 이전달
        state.month--; if(state.month<1){state.month=12;state.year--;}
      }
      saveState(); renderCalendar();
    }
  },{passive:true});
})();

// ── 캘린더 초기화 ──
document.getElementById('resetBtn').onclick = ()=>{
  const title = state.title || '근무 일정 관리';
  const yn = state.year, mn = state.month;
  const answer = confirm(
    `⚠️ 캘린더 초기화\n\n` +
    `"${title}" ${yn}년 ${mn}월의 모든 근무 배정이 삭제됩니다.\n` +
    `직원·업무 목록은 유지됩니다.\n\n` +
    `정말 초기화하시겠습니까?`
  );
  if(!answer) return;
  // 해당 월 일정만 삭제
  Object.keys(state.schedule).forEach(k=>{
    const [y,m]=k.split('-').map(Number);
    if(y===yn && m===mn) delete state.schedule[k];
  });
  saveState();
  renderCalendar();
};
